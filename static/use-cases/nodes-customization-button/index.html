<!doctype html>
<html>
  <head>
    <title>HTMLGraph | Button Nodes Customization</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }

      body {
        position: relative;
        font-family: Arial, sans-serif;
      }

      #canvas {
        position: absolute;
        inset: 0;
      }

      .node {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0;
        width: 200px;
        background: #a8f7ec;
        border: 1px solid #9e9e9e;
        box-shadow: 0 0 5px #9e9e9e;
        border-radius: 5px;
        user-select: none;
      }

      .node-toggled {
        background: #c9a8f7;
      }

      .button {
        padding: 0.5rem;
        border-radius: 3px;
        cursor: pointer;
      }

      .node-port {
        position: relative;
        width: 0;
      }

      .node-port::after {
        content: "";
        position: absolute;
        top: -3px;
        left: -3px;
        width: 6px;
        height: 6px;
        background: #777777;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>
    <script type="module">
      import { CanvasBuilder } from "https://html-graph.github.io/lib/v8.12.1/html-graph.js";

      class Application {
        constructor(canvasElement) {
          this.canvas = new CanvasBuilder(canvasElement)
            .enableUserTransformableViewport()
            .enableUserDraggableNodes()
            .enableBackground()
            .build();
        }

        initGraph() {
          this.canvas.addNode(
            this.createNode({
              name: "Click Me!",
              x: 0,
              y: 0,
              frontPortId: "node-1-in",
              backPortId: "node-1-out",
            }),
          )
          .patchContentMatrix({ scale: 1.5 })
          .focus();
        }

        createNode({ name, x, y, frontPortId, backPortId }) {
          const node = document.createElement("div");
          const button = document.createElement("button");
          const frontPort = document.createElement("div");
          const backPort = document.createElement("div");

          node.classList.add("node");
          frontPort.classList.add("node-port");
          backPort.classList.add("node-port");

          button.classList.add('button');
          button.innerText = name;
          button.addEventListener('click', () => {
            node.classList.toggle("node-toggled");
          });

          node.appendChild(frontPort);
          node.appendChild(button);
          node.appendChild(backPort);

          return {
            element: node,
            x: x,
            y: y,
            ports: [
              { id: frontPortId, element: frontPort },
              { id: backPortId, element: backPort },
            ],
          };
        }
      }

      const canvasElement = document.getElementById("canvas");
      const app = new Application(canvasElement);

      app.initGraph();
    </script>
  </body>
</html>
