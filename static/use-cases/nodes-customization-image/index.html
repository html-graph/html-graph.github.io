<!doctype html>
<html>
  <head>
    <title>HTMLGraph | Image Nodes Customization</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }

      body {
        position: relative;
        font-family: Arial, sans-serif;
      }

      #canvas {
        position: absolute;
        inset: 0;
      }

      .node {
        position: relative;
        width: 200px;
        height: 200px;
        user-select: none;

        img {
          width: 100%;
          height: 100%;
          pointer-events: none;
        }
      }

      .node-port {
        position: relative;
        width: 0;
      }

      .node-port::after {
        content: "";
        position: absolute;
        top: -3px;
        left: -3px;
        width: 6px;
        height: 6px;
        background: #777777;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>
    <script type="module">
      import { CanvasBuilder } from "https://html-graph.github.io/lib/v8.16.0/html-graph.min.js";

      class Application {
        constructor(canvasElement) {
          this.canvas = new CanvasBuilder(canvasElement)
            .enableUserTransformableViewport()
            .enableUserDraggableNodes()
            .enableBackground()
            .build();
        }

        initGraph() {
          this.canvas.addNode(
            this.createNode({
              src: "https://html-graph.github.io/images/pepe.png",
              x: 0,
              y: 0,
              portId: "node-1",
            }),
          )
          .patchContentMatrix({ scale: 1.5 })
          .focus();
        }

        createNode({ src, x, y, portId }) {
          const node = document.createElement("div");
          const img = document.createElement("img");
          img.src = src;

          node.classList.add("node");
          node.appendChild(img);

          return {
            element: node,
            x: x,
            y: y,
            ports: [
              { id: portId, element: node },
            ],
          };
        }
      }

      const canvasElement = document.getElementById("canvas");
      const app = new Application(canvasElement);

      app.initGraph();
    </script>
  </body>
</html>
