<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>HTMLGraph | Minimal Custom Edge Shape demo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }

      body {
        position: relative;
        font-family: Arial, sans-serif;
      }

      #canvas {
        position: absolute;
        inset: 0;
      }

      .node {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100px;
        height: 100px;
        background: #daedbd;
        border: 1px solid #9e9e9e;
        box-shadow: 0 0 5px #9e9e9e;
        border-radius: 50%;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>
    <script type="module">
      import { CanvasBuilder } from "https://html-graph.github.io/lib/v8.24.0/html-graph.min.js";

      class MyCustomEdgeShape {
        constructor() {
          this.svg = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "svg",
          );

          this.svg.style.pointerEvents = "none";
          this.svg.style.position = "absolute";
          this.svg.style.top = "0";
          this.svg.style.left = "0";
          this.svg.style.overflow = "visible";

          this.line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          this.line.setAttribute("stroke", "#777777");
          this.line.setAttribute("stroke-width", "1");
          this.line.setAttribute("fill", "none");

          this.svg.appendChild(this.line);
        }

        render(params) {
          const { from, to } = params;

          const centerFrom = {
            x: from.x + from.width / 2,
            y: from.y + from.height / 2,
          };

          const centerTo = {
            x: to.x + to.width / 2,
            y: to.y + to.height / 2,
          };

          const x = Math.min(centerFrom.x, centerTo.x);
          const y = Math.min(centerFrom.y, centerTo.y);
          const width = Math.abs(centerTo.x - centerFrom.x);
          const height = Math.abs(centerTo.y - centerFrom.y);

          this.svg.style.width = `${width}px`;
          this.svg.style.height = `${height}px`;
          this.svg.style.transform = `translate(${x}px, ${y}px)`;

          const fromPoint = { x: centerFrom.x - x, y: centerFrom.y - y };
          const toPoint = { x: centerTo.x - x, y: centerTo.y - y };

          const linePath = `M ${fromPoint.x} ${fromPoint.y} L ${toPoint.x} ${toPoint.y}`;

          this.line.setAttribute("d", linePath);
        }
      }

      class Application {
        constructor(element) {
          this.canvas = new CanvasBuilder(element)
            .setDefaults({
              nodes: {
                priority: 1,
              },
              edges: {
                shape: () => {
                  return new MyCustomEdgeShape();
                }
              }
            })
            .enableUserDraggableNodes({ moveEdgesOnTop: false })
            .enableUserTransformableViewport()
            .enableBackground()
            .build();
        }

        initGraph() {
          this.canvas
            .addNode(
              this.createNode({
                x: 200,
                y: 200,
                portId: "port-1",
              }),
            )
            .addNode(
              this.createNode({
                x: 600,
                y: 300,
                portId: "port-2",
              }),
            )
            .addEdge({
              from: "port-1",
              to: "port-2",
            })
            .focus();
        }

        createNode({ x, y, portId }) {
          const node = document.createElement("div");

          node.classList.add("node");

          return {
            element: node,
            x: x,
            y: y,
            ports: [
              { id: portId, element: node },
            ],
          };
        }
      }

      const element = document.getElementById("canvas");
      const app = new Application(element);

      app.initGraph();
    </script>
  </body>
</html>
