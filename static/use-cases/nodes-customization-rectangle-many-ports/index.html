<!doctype html>
<html>
  <head>
    <title>HTMLGraph | Nodes Customization Rectangle with Many Ports</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }

      body {
        position: relative;
        font-family: Arial, sans-serif;
      }

      #canvas {
        position: absolute;
        inset: 0;
      }

      .rectangle-many-ports-node {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 300px;
        height: 150px;
        background: #a6d6f4;
        border: 1px solid #9e9e9e;
        box-shadow: 0 0 5px #9e9e9e;
        border-radius: 5px;
        user-select: none;
      }

      .ports-container {
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        height: 100%;
      }

      .node-port {
        position: relative;
        width: 0;
      }

      .node-port::after {
        content: "";
        position: absolute;
        top: -3px;
        left: -3px;
        width: 6px;
        height: 6px;
        background: #777777;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>
    <script type="module">
      import { CanvasBuilder } from "https://html-graph.github.io/lib/v8.18.0/html-graph.min.js";

      class Application {
        constructor(canvasElement) {
          this.canvas = new CanvasBuilder(canvasElement)
            .enableUserTransformableViewport()
            .enableUserDraggableNodes()
            .enableBackground()
            .build();
        }

        initGraph() {
          this.canvas.addNode(
            this.createNode({
              name: "Rectangle with Many Ports",
              x: 0,
              y: 0,
              frontPorts: [
                "node-1-1-in",
                "node-1-2-in",
                "node-1-3-in",
                "node-1-4-in",
                "node-1-5-in",
              ],
              backPorts: [
                "node-1-1-out",
                "node-1-2-out",
                "node-1-3-out",
                "node-1-4-out",
                "node-1-5-out",
              ],
            }),
          )
          .patchContentMatrix({ scale: 1.5 })
          .focus();
        }

        createNode({ name, x, y, frontPorts, backPorts }) {
          const node = document.createElement("div");
          const text = document.createElement("div");
          const frontPortsContainer = document.createElement("div");
          const backPortsContainer = document.createElement("div");

          node.classList.add("rectangle-many-ports-node");
          frontPortsContainer.classList.add("ports-container");
          backPortsContainer.classList.add("ports-container");
          text.innerText = name;

          node.appendChild(frontPortsContainer);
          node.appendChild(text);
          node.appendChild(backPortsContainer);

          const ports = [];

          frontPorts.forEach(id => {
            const portElement = document.createElement("div");
            portElement.classList.add("node-port");

            frontPortsContainer.appendChild(portElement);
            ports.push({ id: id, element: portElement });
          });

          backPorts.forEach(id => {
            const portElement = document.createElement("div");
            portElement.classList.add("node-port");

            backPortsContainer.appendChild(portElement)
            ports.push({ id: id, element: portElement });
          })

          return {
            element: node,
            x: x,
            y: y,
            ports: ports,
          };
        }
      }

      const canvasElement = document.getElementById("canvas");
      const app = new Application(canvasElement);

      app.initGraph();
    </script>
  </body>
</html>
