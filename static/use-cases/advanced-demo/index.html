<!doctype html>
<html>
  <head>
    <title>HTMLGraph | Advanced demo</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }

      body {
        position: relative;
        color: #02020a;
        --color-edge: #777777;
        font-family: Arial, sans-serif;
      }

      #canvas {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .node {
        min-width: 16rem;
        position: relative;
        border-radius: 0.5rem;
        background: #daedbd;
        border: 1px solid #9e9e9e;
        user-select: none;
        box-shadow: 0 0 0.5rem #9e9e9e;
      }

      .node-header {
        display: flex;
        flex-direction: column;
      }

      .node-content {
        display: flex;
        flex-direction: column;
        vertical-align: stretch;
        gap: 0.5rem;
        padding: 0.5rem;
      }

      .node-port {
        position: absolute;
      }

      /**
       * Port grab area must be large enough to provide a comfortable click/drag target.
       * The 2rem diameter creates a generous hit area around each port.
       */
      .node-port-grab-area {
        display: flex;
        justify-content: center;
        align-items: center;
        position: absolute;
        top: -1rem;
        left: -1rem;
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
      }

      /**
       * A small circular pin that represents the connection point.
       */
      .node-port-pin {
        --port-size: 3px;
        width: calc(2 * var(--port-size));
        height: calc(2 * var(--port-size));
        background: var(--color-edge);
        border-radius: calc(2 * var(--port-size));
      }

      .node-text {
        resize: vertical;
        width: 100%;
        height: 4rem;
        box-sizing: border-box;
      }

      .node-port-content {
        position: relative;
        display: flex;
        justify-content: flex-end;
        background: #fff;
        border-radius: 0.5rem;
        margin: 0.25rem 0;
        padding: 0.25rem;
        font-size: 12px;
        line-height: 12px;
      }

      .node-port-input {
        top: 50%;
      }

      .node-port-output {
        top: 50%;
        right: -9px;
      }

      .remove-button {
        display: none;
        --remove-color: #e88b74;
        --remove-background: white;
      }

      /* Show remove button only when the edge is selected */
      .selected-edge .remove-button {
        display: block;
      }

      .remove-button:hover {
        --remove-color: #f93707;
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>
    <script type="module">
      import {
        CanvasBuilder,
        HorizontalEdgeShape,
        MidpointEdgeShape,
        InteractiveEdgeShape,
      } from "https://html-graph.github.io/lib/v8.16.0/html-graph.min.js";

      class Application {
        /**
         * Controls the Z-index ordering of nodes.
         * Incrementing this value ensures each new node appears above previous ones.
         */
        nodePriority = 1;

        /** Tracks the currently selected edge ID for styling and operations */
        selectedEdgeId = null;

        /**
         * Factory function that creates interactive edges with a "Remove" button.
         * The remove button becomes visible only when the edge is selected.
         */
        edgeShapeFactory = (edgeId) => {
          const baseShape = new HorizontalEdgeShape({
            color: "var(--color-edge)",
            hasTargetArrow: true,
            detourDistance: -150,
          });

          // Add click interaction to select the edge
          const interactiveShape = new InteractiveEdgeShape(baseShape, { distance: 20 });

          interactiveShape.svg.addEventListener("click", (event) => {
            event.stopPropagation();
          });

          // Add remove button at the midpoint of the edge
          const midpoint = this.createRemoveEdgeButton();

          midpoint.addEventListener("click", (event) => {
            event.stopPropagation();
            this.canvas.removeEdge(edgeId);
          });

          return new MidpointEdgeShape(interactiveShape, midpoint);
        };

        /**
         * Determines the direction of a new connection based on port type.
         * Enforces business rules for edge creation in the nocode editor.
         */
        connectionTypeResolver = (portId) => {
          const edgeIds = this.canvas.graph.getPortAdjacentEdgeIds(portId);
          const hasSelectedEdge = edgeIds.find((edgeId) => edgeId === this.selectedEdgeId);

          // Prevent creating new edges if a selected edge is already attached to this port
          if (hasSelectedEdge !== undefined) {
            return null;
          }

          // Enforce that output ports have at most one connection
          if (portId.startsWith("output-") && edgeIds.length > 0) {
            return null;
          }

          /**
           * Output port grab creates direct connection
           * Input port grab creates reverse connection
           */
          return portId.startsWith("output-") ? "direct" : "reverse";
        };

        /**
         * Validates connection requests before edge creation.
         * Prevents duplicate edges and enforces port type compatibility.
         */
        connectionPreprocessor = (request) => {
          // Prevent duplicate edges between the same source and target ports
          const existingEdge = this.canvas.graph.getAllEdgeIds().find((edgeId) => {
            const edge = this.canvas.graph.getEdge(edgeId);

            return edge.from === request.from && edge.to === request.to;
          });

          if (existingEdge !== undefined) {
            return null;
          }

          const adjacentFromEdges = this.canvas.graph.getPortAdjacentEdgeIds(request.from);

          // Prevent creating multiple edges from the same source port
          if (adjacentFromEdges.length > 0) {
            return null;
          }

          /**
           * Enforce connection direction rules:
           * Only allow connections from output ports (sources) to input ports (targets)
           */
          if (request.from.startsWith("output-") && request.to.startsWith("input-")) {
            return request;
          }

          return null;
        };

        /**
         * Determines which edge should be dragged when a port is clicked
         * Prioritizes the selected edge when multiple options exist
         */
        draggingEdgeResolver = (portId) => {
          const edgeIds = this.canvas.graph.getPortAdjacentEdgeIds(portId);

          // For output ports with exactly one edge, that's the only candidate
          if (portId.startsWith("output-") && edgeIds.length === 1) {
            return edgeIds[0];
          }

          const hasSelectedEdge = edgeIds.find((edgeId) => edgeId === this.selectedEdgeId);

          // Prefer the currently selected edge if it's adjacent to this port
          if (hasSelectedEdge !== undefined) {
            return this.selectedEdgeId;
          }

          return null;
        };

        /**
         * Restores the original edge when a reattachment operation is rejected
         * This maintains data integrity when connection rules prevent the operation
         */
        onEdgeReattachPrevented = (payload) => {
          this.canvas.addEdge({
            id: payload.id,
            from: payload.from,
            to: payload.to,
            shape: payload.shape,
            priority: payload.priority,
          });
        };

        /**
         * Restores the original edge when a reattachment operation is interrupted mid-process
         * Provides graceful recovery from incomplete drag operations
         */
        onEdgeReattachInterrupted = (payload) => {
          this.canvas.addEdge({
            id: payload.id,
            from: payload.from,
            to: payload.to,
            shape: payload.shape,
            priority: payload.priority,
          });
        };

        constructor(canvasElement) {
          this.canvasElement = canvasElement;

          this.canvas = new CanvasBuilder(this.canvasElement)
            .setDefaults({
              nodes: {
                /**
                 * Position nodes from top-left corner rather than center
                 * This is particularly useful when nodes contain resizable elements like textareas
                 */
                centerFn: () => ({ x: 0, y: 0 }),
                priority: () => this.nodePriority++,
              },
              edges: {
                shape: this.edgeShapeFactory,
                priority: 0, // Keep edges below nodes to maintain visual hierarchy
              },
            })
            .enableUserDraggableNodes({
              moveEdgesOnTop: false, // Maintain proper Z-index during drag operations
              gridSize: 25, // Snap to grid for cleaner, more organized layouts
            })
            .enableUserTransformableViewport()
            /**
             * Automatically update edge connections when nodes change size
             * Essential for nodes with textareas or dynamic content
             */
            .enableNodeResizeReactiveEdges()
            .enableBackground()
            .enableUserConnectablePorts({
              edgeShape: {
                type: "horizontal",
                color: "var(--color-edge)",
                hasTargetArrow: true,
              },
              connectionTypeResolver: this.connectionTypeResolver,
              connectionPreprocessor: this.connectionPreprocessor,
            })
            .enableUserDraggableEdges({
              mouseDownEventVerifier: (event) => event.button === 0,
              draggingEdgeResolver: this.draggingEdgeResolver,
              connectionPreprocessor: this.connectionPreprocessor,
              events: {
                onEdgeReattachPrevented: this.onEdgeReattachPrevented,
                onEdgeReattachInterrupted: this.onEdgeReattachInterrupted,
              },
            })
            .enableUserSelectableEdges({
              onEdgeSelected: (selectedEdgeId) => {
                this.setSelectedEdge(selectedEdgeId);

                this.canvas.graph.getAllEdgeIds().forEach((edgeId) => {
                  const { shape } = this.canvas.graph.getEdge(edgeId);
                  const width = edgeId === selectedEdgeId ? 2 : 1;

                  shape.line.setAttribute("stroke-width", `${width}`);

                  if (edgeId === selectedEdgeId) {
                    shape.svg.classList.add("selected-edge");
                  } else {
                    shape.svg.classList.remove("selected-edge");
                  }
                });
              },
            })
            .enableUserSelectableCanvas({
              onCanvasSelected: () => {
                this.setSelectedEdge(null);

                this.canvas.graph.getAllEdgeIds().forEach((edgeId) => {
                  const { shape } = this.canvas.graph.getEdge(edgeId);

                  shape.line.setAttribute("stroke-width", "1");
                  shape.svg.classList.remove("selected-edge");
                });
              },
            })
            .build();
        }

        /**
         * Updates the currently selected edge and refreshes edge styling
         */
        setSelectedEdge(selectedEdgeId) {
          this.selectedEdgeId = selectedEdgeId;
        }

        /**
         * Initializes the graph with predefined nodes and connections
         * Creates a workflow-like structure demonstrating the editor's capabilities
         */
        initGraph() {
          this.canvas
            .addNode(
              this.createNode({
                name: "Node 1",
                x: 200,
                y: 400,
                frontPortId: null,
                outputPorts: {
                  "output-1-1": "Port 1",
                  "output-1-2": "Port 2",
                },
              }),
            )
            .addNode(
              this.createNode({
                name: "Node 2",
                x: 600,
                y: 500,
                frontPortId: "input-2",
                outputPorts: {
                  "output-2-1": "Port 1",
                  "output-2-2": "Port 2",
                  "output-2-3": "Port 3",
                },
                footerContent: this.createTextArea(),
              }),
            )
            .addNode(
              this.createNode({
                name: "Node 3",
                x: 600,
                y: 200,
                frontPortId: "input-3",
                outputPorts: {
                  "output-3-1": "Port 1",
                  "output-3-2": "Port 2",
                  "output-3-3": "Port 3",
                },
              }),
            )
            .addNode(
              this.createNode({
                name: "Node 4",
                x: 1100,
                y: 400,
                frontPortId: "input-4",
                outputPorts: {
                  "output-4-1": "Port 1",
                },
              }),
            )
            .addNode(
              this.createNode({
                name: "Node 5",
                x: 1100,
                y: 550,
                frontPortId: "input-5",
                outputPorts: {
                  "output-5-1": "Port 1",
                  "output-5-2": "Port 2",
                },
              }),
            )
            .addEdge({ from: "output-1-1", to: "input-3" })
            .addEdge({ from: "output-1-2", to: "input-2" })
            .addEdge({ from: "output-2-1", to: "input-4" })
            .addEdge({ from: "output-3-1", to: "input-4" })
            .addEdge({ from: "output-2-2", to: "input-5" })
            .patchContentMatrix({ scale: 0.7 }) // Initial zoom level
            .center({ x: 800, y: 450 });
        }

        /**
         * Creates a DOM node with customizable ports and content
         */
        createNode({
          name,
          x,
          y,
          frontPortId,
          outputPorts,
          footerContent,
        }) {
          const element = document.createElement("div");
          element.classList.add("node");

          const ports = [];

          // Add input port if specified (left side of node)
          if (frontPortId !== null) {
            const inputPort = this.createInputPort();
            element.appendChild(inputPort);
            ports.push({ id: frontPortId, element: inputPort });
          }

          const content = this.createContentElement();
          element.appendChild(content);

          const input = this.createInputElement(name);
          content.appendChild(input);

          // Add output ports if any (right side of node)
          if (Object.keys(outputPorts).length > 0) {
            const [body, elements] = this.createBodyElement(outputPorts);
            content.appendChild(body);
            elements.forEach((value) => {
              ports.push(value);
            });
          }

          // Add optional footer content
          if (footerContent) {
            const footer = document.createElement("div");
            footer.classList.add("node-footer");
            footer.appendChild(footerContent);
            content.appendChild(footer);
          }

          return { element, x, y, ports };
        }

        /** Creates an input port positioned on the left side of the node */
        createInputPort() {
          return this.createPortElement("node-port-input");
        }

        /** Factory method for creating port elements with optional positioning class */
        createPortElement(className) {
          const port = document.createElement("div");
          port.classList.add("node-port");
          port.classList.add(className);

          const grabArea = document.createElement("div");
          grabArea.classList.add("node-port-grab-area");

          port.appendChild(grabArea);

          const pin = document.createElement("div");
          pin.classList.add("node-port-pin");

          grabArea.appendChild(pin);

          return port;
        }

        /** Creates a textarea for multi-line text input within a node */
        createTextArea() {
          const area = document.createElement("textarea");
          area.classList.add("node-text");
          area.value =
            "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.";
          this.prepareNodeTextareaElement(area);

          return area;
        }

        /** Creates the main content container for node elements */
        createContentElement() {
          const content = document.createElement("div");
          content.classList.add("node-content");

          return content;
        }

        /** Creates an editable input field for the node's title/name */
        createInputElement(name) {
          const input = document.createElement("input");
          input.classList.add("node-input");
          input.placeholder = "Enter node name";
          input.value = name;
          this.prepareNodeInputElement(input);

          return input;
        }

        /**
         * Creates the body section containing output ports
         */
        createBodyElement(ports) {
          const body = document.createElement("div");
          body.classList.add("node-body");

          const portElements = [];

          Object.entries(ports).forEach(([key, value]) => {
            const portContent = document.createElement("div");
            portContent.classList.add("node-port-content");
            portContent.innerText = value;

            const port = this.createPortElement("node-port-output");
            portContent.appendChild(port);

            body.appendChild(portContent);
            portElements.push({ id: key, element: port });
          });

          return [body, portElements];
        }

        /**
         * Configures input elements to work correctly within draggable nodes
         * Prevents drag operations when interacting with the input field
         */
        prepareNodeInputElement(element) {
          element.addEventListener("mousemove", (event) => {
            if (document.activeElement === event.target) {
              event.stopPropagation(); // Don't drag while editing text
            }
          });
        }

        /**
         * Configures textareas to work correctly within draggable nodes
         * Allows text selection, scrolling, and editing without triggering node drag
         */
        prepareNodeTextareaElement(element) {
          let hover = false;
          let down = false;

          element.addEventListener("mouseover", () => {
            hover = true;
          });

          element.addEventListener("mouseleave", () => {
            hover = false;
          });

          element.addEventListener("mousedown", (event) => {
            event.stopPropagation(); // Prevent drag initiation
            down = true;
          });

          element.addEventListener("mouseup", () => {
            down = false;
          });

          element.addEventListener("mousemove", (event) => {
            if (down) {
              event.stopPropagation(); // Allow text selection without dragging node
            }
          });

          element.addEventListener("wheel", (event) => {
            if (hover) {
              event.stopPropagation(); // Allow scrolling within textarea without zooming canvas
            }
          });
        }

        /**
         * Creates an SVG remove button that appears at the midpoint of selected edges
         * The button consists of a circular background and an X symbol
         */
        createRemoveEdgeButton() {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          group.style.setProperty("pointer-events", "auto");
          group.style.setProperty("cursor", "pointer");
          group.classList.add("remove-button");

          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", "0");
          circle.setAttribute("cy", "0");
          circle.setAttribute("r", "7");
          circle.setAttribute("fill", "var(--remove-background)");
          circle.setAttribute("stroke", "var(--remove-color)");

          const cross = document.createElementNS("http://www.w3.org/2000/svg", "path");
          cross.setAttribute("d", "M -3 -3 L 3 3 M 3 -3 L -3 3");
          cross.setAttribute("stroke", "var(--remove-color)");

          group.appendChild(circle);
          group.appendChild(cross);

          return group;
        }
      }

      const canvasElement = document.getElementById("canvas");
      const app = new Application(canvasElement);

      app.initGraph();
    </script>
  </body>
</html>
